{% extends 'base.html' %}
{% load static %}
{% block title %}kotoby – Login{% endblock %}
{% block extra_css %}
<style>
    .main-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }
    .container {
        width: 70vw;
        max-width: 500px;
        padding: 40px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }
    input {
        display: block;
        color: white;
        padding: 0 16px;
        width: 100%;
        height: 40px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: height 0.2s, border-radius 0.2s;
    }
    input:focus { outline: none; height: 48px; border-radius: 16px; color: white; }
    input::placeholder { font-weight: 300; opacity: 0.5; color: white; }
    label { font-weight: 500; color: white; }
    .container #form-title { text-align: center; color: white; margin-bottom: 24px; }
    .container #quest { font-weight: 900; padding: 16px; text-align: center; color: white; }
    a { color: #601bde; text-decoration: none; }
    input[type="submit"] {
        display: block;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 300px;
        margin: 16px auto 0;
        cursor: pointer;
        transition: background-color 0.2s, color 0.2s;
        color: white;
    }
    input[type="submit"]:hover { background: white; color: #601bde; }
</style>
{% endblock %}
{% block content %}
<div class="main-content">
  <div class="container">
    <h2 id="form-title">Login</h2>
    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <label for="login-username">Username:</label><br>
      <input type="text" id="login-username" name="username" placeholder="Enter your username"><br><br>
      <label for="login-password">Password:</label><br>
      <input type="password" id="login-password" name="password" placeholder="Enter your password"><br><br>
      {% if form.errors %}
        <p style="color: salmon; text-align: center;">Invalid username or password.</p><br>
      {% endif %}
      <div class="submit">
        <input type="submit" id="mySubmit" value="Login">
      </div>
    </form>
    <p id="quest">Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></p>
  </div>
</div>
{% endblock %}
